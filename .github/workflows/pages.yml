name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble site (no .git or dev-only files)
        run: |
          mkdir -p _site
          cp index.html styles.css .nojekyll _site/
          cp -R js assets markers _site/
          VER=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || head -n1 VERSION)
          printf "%s\n" "$VER" > _site/version.txt

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
